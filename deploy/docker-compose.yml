networks:
  app-net: {}
  database_default:
    external: true

volumes:
  m2-cache:
  node-mod-cache:

services:
  backend:
    build: { context: ../backend, target: dev }
    env_file: dev.env
    volumes:
      - ../backend/src:/app/src:cached
      - ../backend/target/classes:/app/target/classes
      - ../backend/uploads:/app/uploads
      - m2-cache:/root/.m2
    command: >
      mvn -q spring-boot:run
      -Dspring-boot.run.jvmArguments="$JAVA_DEBUG_OPTS"
    expose: ["8080", "35729"]
    ports:
      - "127.0.0.1:8080:8080"   # local API debug only; browser traffic goes through nginx HTTPS
      - "127.0.0.1:35729:35729" # LiveReload (optional)
      - "127.0.0.1:5005:5005"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ws/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app-net
      - database_default

  frontend:
    build:
      context: ../frontend
      target: dev
      args:
        BUN_VERSION: latest
    env_file: ./dev.env
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
      - VITE_API_URL=https://localhost/api
    volumes:
      - ../frontend:/app:cached
      - node-mod-cache:/app/node_modules
    command: >
      sh -lc "bun install && bun run dev -- --host 0.0.0.0"
    expose: ["5173"]
    networks: [app-net]

  nginx:
    build: ../nginx
    env_file: dev.env
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks: [app-net]
