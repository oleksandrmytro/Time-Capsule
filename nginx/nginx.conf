server {
    listen 80;

    # ── REST API ────────────────────────────────
    location /api/ {
        client_max_body_size 60M;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static files (tag images, uploads) ──────
    location /static/tags/ {
        proxy_pass         http://backend:8080/static/tags/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    location /static/covers/ {
        proxy_pass         http://backend:8080/static/covers/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public";
    }

    location /uploads/ {
        proxy_pass         http://backend:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # ── OAuth2 Authentication ──────────────────
    location /oauth2/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── STOMP/SockJS WebSocket ──────────────────
    location /ws/ {
        proxy_pass         http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   Cookie $http_cookie;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WebSocket HMR Vite 7 ───────────────────
    location /vite-dev {
        proxy_pass         http://frontend:5173/vite-dev;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 36000;   # чтобы не обрывалось каждые 60 с
    }

    # ── Остальные пути → Vite dev‑server ────────
    location / {
        proxy_pass         http://frontend:5173/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;

        # SPA fallback: for client-side routes like /login, /capsules, etc.
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
