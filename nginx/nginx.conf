map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    set $backend_upstream backend:8080;
    set $frontend_upstream frontend:5173;

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # REST API
    location /api/ {
        client_max_body_size 60M;
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Static files
    location /static/tags/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_set_header   X-Forwarded-Proto https;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    location /static/covers/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_set_header   X-Forwarded-Proto https;
        expires            7d;
        add_header         Cache-Control "public";
    }

    location /uploads/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_set_header   X-Forwarded-Proto https;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # Tile proxy for Leaflet/Cesium
    location /tiles/osm/ {
        proxy_pass            https://tile.openstreetmap.org/;
        proxy_http_version    1.1;
        proxy_ssl_server_name on;
        proxy_set_header      Host tile.openstreetmap.org;
        expires               2h;
        add_header            Cache-Control "public, max-age=7200";
    }

    location /tiles/carto/ {
        proxy_pass            https://a.basemaps.cartocdn.com/light_all/;
        proxy_http_version    1.1;
        proxy_ssl_server_name on;
        proxy_set_header      Host a.basemaps.cartocdn.com;
        expires               2h;
        add_header            Cache-Control "public, max-age=7200";
    }

    # OAuth2
    location /oauth2/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /login/oauth2/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # STOMP/SockJS WebSocket
    location /ws/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   Cookie $http_cookie;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Vite HMR through HTTPS/WSS
    location /vite-dev {
        proxy_pass         http://$frontend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 36000;
    }

    location / {
        proxy_pass         http://$frontend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
