server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $backend_upstream backend:8080;
    set $frontend_upstream frontend:5173;

    # ── REST API ────────────────────────────────
    location /api/ {
        client_max_body_size 60M;
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static files (tag images, uploads) ──────
    location /static/tags/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    location /static/covers/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public";
    }

    location /uploads/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # ── Tile proxy for Leaflet/Cesium (same-origin, avoids client-side blocking) ─────────
    location /tiles/osm/ {
        proxy_pass            https://tile.openstreetmap.org/;
        proxy_http_version    1.1;
        proxy_ssl_server_name on;
        proxy_set_header      Host tile.openstreetmap.org;
        expires               2h;
        add_header            Cache-Control "public, max-age=7200";
    }

    location /tiles/carto/ {
        proxy_pass            https://a.basemaps.cartocdn.com/light_all/;
        proxy_http_version    1.1;
        proxy_ssl_server_name on;
        proxy_set_header      Host a.basemaps.cartocdn.com;
        expires               2h;
        add_header            Cache-Control "public, max-age=7200";
    }

    # ── OAuth2 Authentication ──────────────────
    location /oauth2/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── STOMP/SockJS WebSocket ──────────────────
    location /ws/ {
        proxy_pass         http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   Cookie $http_cookie;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WebSocket HMR Vite 7 ───────────────────
    location /vite-dev {
        proxy_pass         http://$frontend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 36000;   # чтобы не обрывалось каждые 60 с
    }

    # ── Остальные пути → Vite dev‑server ────────
    location / {
        proxy_pass         http://$frontend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
